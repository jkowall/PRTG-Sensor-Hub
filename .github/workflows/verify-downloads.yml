name: Verify Sensor Downloads

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Run verification
        env:
          VERIFICATION_URL: ${{ secrets.VERIFICATION_URL }}
          VERIFICATION_TOKEN: ${{ secrets.VERIFICATION_TOKEN }}
        run: |
          if [ -z "$VERIFICATION_URL" ] || [ -z "$VERIFICATION_TOKEN" ]; then
            echo "Missing VERIFICATION_URL or VERIFICATION_TOKEN secret"
            exit 1
          fi
          echo "Fetching verification from: $VERIFICATION_URL"
          response=$(curl -sS -w "\n%{http_code}" -H "x-verification-token: $VERIFICATION_TOKEN" "$VERIFICATION_URL?check_source=true")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          echo "HTTP Status: $http_code"
          echo "Response body:"
          echo "$body"
          
          if [ "$http_code" != "200" ]; then
            echo "Verification endpoint returned HTTP $http_code"
            exit 1
          fi
          
          echo "$body" > verification.json
          node -e "
            const fs=require('fs');
            const data=JSON.parse(fs.readFileSync('verification.json','utf8'));
            console.log('Checked versions:', data.checked_versions);
            console.log('Imported versions:', data.imported_versions);
            if(data.checked_source_urls){
              console.log('Checked source URLs:', data.checked_source_urls);
            }
            console.log('Total issues:', data.issue_count);
            if(!data||typeof data.issue_count!=='number'){
              console.error('Invalid response structure');
              process.exit(1);
            }
            const critical = (data.issues||[]).filter(i =>
              i.issue_code === 'download_missing' || i.issue_code === 'download_error'
            );
            const sourceWarnings = (data.issues||[]).filter(i =>
              i.issue_code === 'source_url_broken'
            );
            const warnings = (data.issues||[]).filter(i =>
              i.issue_code !== 'download_missing' && i.issue_code !== 'download_error' && i.issue_code !== 'source_url_broken'
            );
            if(sourceWarnings.length > 0){
              console.log('⚠ ' + sourceWarnings.length + ' broken source URL(s) for imported sensors:');
              sourceWarnings.forEach(w => console.log('  - ' + w.display_name + ' (' + w.slug + '): ' + w.issue_summary));
            }
            if(warnings.length > 0){
              console.log('⚠ ' + warnings.length + ' metadata warning(s):');
              warnings.forEach(w => console.log('  - ' + w.display_name + ': ' + w.issue_summary));
            }
            if(critical.length > 0){
              console.error('✗ ' + critical.length + ' download failure(s):');
              critical.forEach(c => console.error('  - ' + c.display_name + ': ' + c.issue_summary + (c.issue_detail ? ' (' + c.issue_detail + ')' : '')));
              process.exit(1);
            }
            console.log('✓ Verification passed - no download failures');
          "
