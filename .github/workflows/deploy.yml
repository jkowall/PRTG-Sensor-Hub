name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: Deploy Web (Pages)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: Build Next.js app
        working-directory: apps/web
        run: npm run pages:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy
          secrets: |
            NEXTAUTH_SECRET
            GITHUB_CLIENT_ID
            GITHUB_CLIENT_SECRET
            GITHUB_BOT_TOKEN
            VERIFICATION_TOKEN
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GITHUB_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          VERIFICATION_TOKEN: ${{ secrets.VERIFICATION_TOKEN }}

      - name: Apply D1 Migrations
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e

          # Create migration tracking table
          npx wrangler d1 execute DB --remote --command "CREATE TABLE IF NOT EXISTS _migrations (name TEXT PRIMARY KEY, applied_at DATETIME DEFAULT CURRENT_TIMESTAMP);"

          # Seed migrations applied before tracking was introduced
          npx wrangler d1 execute DB --remote --command "INSERT OR IGNORE INTO _migrations (name) VALUES ('001_builtin_status.sql'), ('002_add_docs_url.sql');"

          # Apply pending migrations in order
          for migration in migrations/*.sql; do
            name=$(basename "$migration")

            if npx wrangler d1 execute DB --remote --command "SELECT name FROM _migrations WHERE name = '${name}';" 2>&1 | grep -q "${name}"; then
              echo "Skipping ${name} (already applied)"
              continue
            fi

            echo "Applying ${name}..."
            npx wrangler d1 execute DB --remote --file="$migration"
            npx wrangler d1 execute DB --remote --command "INSERT INTO _migrations (name) VALUES ('${name}');"
            echo "${name} applied successfully"
          done

          echo "All migrations up to date."
